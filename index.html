<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wolfsites - Fastest Finger</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --accent: #ffffff;
      --text: #f0f0f0;
      --muted: #888;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* Hintergrund-Effekt */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(120px, 80px); }
    }

    .container {
      max-width: 680px;
      width: 100%;
      text-align: center;
      animation: fadeUp 0.8s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 12vw, 7rem);
      letter-spacing: 0.05em;
      line-height: 0.9;
      color: var(--accent);
      text-shadow: 0 0 60px rgba(255,255,255,0.15);
    }

    .divider {
      width: 60px;
      height: 2px;
      background: var(--accent);
      margin: 1.5rem auto;
      opacity: 0.6;
    }

    .app-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 6vw, 3.2rem);
      letter-spacing: 0.08em;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .app-desc {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--muted);
      font-weight: 300;
      max-width: 480px;
      margin: 0 auto 2.5rem;
    }

    .badge {
      display: inline-block;
      background: var(--surface);
      border: 1px solid #222;
      border-radius: 999px;
      padding: 0.3rem 1rem;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      padding: 0.85rem 2.2rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      transition: all 0.2s ease;
      margin: 0.4rem;
    }

    .btn-primary {
      background: var(--accent);
      color: #0a0a0a;
    }
    .btn-primary:hover {
      background: #ddd;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255,255,255,0.15);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid #2a2a2a;
    }
    .btn-ghost:hover {
      border-color: #444;
      color: var(--text);
      transform: translateY(-2px);
    }

    footer {
      margin-top: 4rem;
      font-size: 0.75rem;
      color: #333;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">Wolfsites</div>
    <div class="divider"></div>

    <div class="badge">Mobile App</div>
    <div class="app-title">Fastest Finger</div>

    <p class="app-desc">
      Teste deine Reaktionszeit und miss dich mit anderen - Fastest Finger ist das schnelle Geschicklichkeitsspiel für Android und iOS. Wie schnell bist du wirklich?
    </p>

    <div>
      <a href="https://sites.google.com/wolfsites.de/fastest-finger/datenschutzerkl%C3%A4rung" target="_blank" class="btn btn-primary">
        Datenschutzerklärung
      </a>
      <a href="www.wolfsites.de/play" target="_blank" class="btn btn-ghost">
        Jetzt spielen
      </a>
    </div>
  </div>

  <footer>© Wolfsites by Niklas Wolf</footer>
</body>
</html>
